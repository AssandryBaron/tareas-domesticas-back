spring.application.name=tareas-domesticas

# 1. ConexiÛn a PostgreSQL (localhost es tu PC)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# 2. Hibernate: Esta lÌnea crea las tablas autom·ticamente en tu DB
spring.jpa.hibernate.ddl-auto=update

# 3. Muestra en la consola de IntelliJ las consultas que se hacen
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
